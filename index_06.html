<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvAI Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #1C1B1A;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <elevenlabs-convai 
    agent-id="agent_9701kpv2zakjervsk318y33a15xr"
    variant="full"
    dismissible="false"
  ></elevenlabs-convai>
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
  <script>
    setTimeout(() => {
      const widget = document.querySelector('elevenlabs-convai');
      if (widget && widget.shadowRoot) {
        const els = widget.shadowRoot.querySelectorAll('*');
        let colors = [];
        els.forEach(el => {
          const bg = getComputedStyle(el).backgroundColor;
          if (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent') {
            colors.push(el.tagName + ': ' + bg);
          }
        });
        alert('Widget colors:\n' + colors.join('\n'));
      }
    }, 3000);
  </script>
</body>
</html>
